<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Video Browser</h1>
      <div class="header-actions">
        <button id="importBtn" type="button">Import Media</button>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="openLibraryBtn" type="button">Open Library Folder</button>
      </div>
    </header>

    <main>
      <aside>
        <div class="folder-toolbar">
          <h2>Folders</h2>
          <button id="createFolderBtn" type="button">+ New</button>
        </div>
        <ul id="folderList"></ul>
      </aside>

      <section class="library-panel">
        <div class="library-header">
          <div>
            <h2 id="activeFolderTitle">All Media</h2>
            <p id="libraryPathLabel" class="library-path"></p>
          </div>
          <p>Edits in your library folder are auto-detected.</p>
        </div>
        <ul id="mediaGrid" class="media-grid"></ul>
      </section>

      <section class="player-panel">
        <h2>Player</h2>
        <div id="playerWrapper" class="player-wrapper empty">
          <p>Select a media file to preview it.</p>
        </div>
        <div id="nowPlaying" class="now-playing"></div>
      </section>
    </main>

    <div id="folderModal" class="folder-modal hidden" aria-hidden="true">
      <div class="folder-modal-backdrop" data-close-modal="true"></div>
      <div class="folder-modal-content" role="dialog" aria-modal="true" aria-labelledby="folderModalTitle">
        <form id="folderForm">
          <h3 id="folderModalTitle">Create folder</h3>
          <label for="folderNameInput">Folder name</label>
          <input id="folderNameInput" type="text" maxlength="60" required placeholder="e.g. Tutorials" />
          <p id="folderFormError" class="form-error" hidden></p>
          <div class="folder-form-actions">
            <button type="button" id="cancelFolderBtn">Cancel</button>
            <button type="submit" id="saveFolderBtn">Create</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
